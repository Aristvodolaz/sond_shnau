# Подключите внутри server { ... } для helps-pet.ru (или в location /)
# Иначе загрузки >1MB дают 413 Request Entity Too Large (лимит Nginx по умолчанию)

client_max_body_size 25m;

# Опционально: таймауты для медленного интернета при больших файлах
client_body_timeout 120s;
proxy_read_timeout 120s;
proxy_send_timeout 120s;
