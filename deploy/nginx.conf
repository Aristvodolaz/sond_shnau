# Nginx конфиг для fond-schnauzers
# Разместить: /etc/nginx/sites-available/fond-schnauzers
# Активировать: ln -s /etc/nginx/sites-available/fond-schnauzers /etc/nginx/sites-enabled/
# Проверить: nginx -t && systemctl reload nginx

# Замените YOUR_DOMAIN на реальный домен (например: shnau.ru)
# Если SSL не нужен — используйте только блок HTTP на порту 80

# ──────────────────────────────────────────────
# HTTP → HTTPS redirect (если используется SSL)
# ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot при получении сертификата сам добавит location /.well-known/acme-challenge
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────
# HTTPS → приложение на localhost:8448
# ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL сертификаты (Let's Encrypt через certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # Современные SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Лимит на загрузку файлов (25MB для фото)
    client_max_body_size 25m;
    client_body_timeout 120s;

    # Логи
    access_log /var/log/nginx/fond-schnauzers-access.log;
    error_log  /var/log/nginx/fond-schnauzers-error.log;

    # Proxy → Node/Nuxt на порту 8448
    location / {
        proxy_pass         http://127.0.0.1:8448;
        proxy_http_version 1.1;

        # Поддержка WebSocket (Nuxt HMR не нужен в prod, но оставим на всякий случай)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для медленных запросов и загрузки файлов
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Буферизация ответов
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }
}

